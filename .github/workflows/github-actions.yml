name: CI
on: [push, pull_request]

env:
  POETRY_HOME: /home/runner/.local
  POETRY_CACHE_DIR: /home/runner/.local/.cache

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        docker-image:
          - docker.kurrent.io/kurrent-latest/kurrentdb:25.1.0-x64-8.0-bookworm-slim
          - kurrentplatform/kurrentdb:26.0.2
          - kurrentplatform/kurrentdb:26.1.1
    env:
      DOCKER_IMAGE: ${{ matrix.docker-image }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: make install-poetry
      - name: Install packages
        run: make install
      - name: Start KurrentDB
        run: make start-kurrentdb
      - name: Lint
        run: make lint
      - name: Test
        run: make test
